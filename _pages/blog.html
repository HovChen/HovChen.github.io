<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('searchInput');
  const blogList = document.getElementById('blogList');
  const blogItems = Array.from(blogList.getElementsByClassName('blog-item'));

  searchInput.addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();

    blogItems.forEach(item => {
      const title = item.querySelector('.blog-title').textContent.toLowerCase();
      const excerpt = item.querySelector('.blog-excerpt').textContent.toLowerCase();
      const tags = Array.from(item.querySelectorAll('.tag')).map(tag => tag.textContent.toLowerCase());
      
      const isMatch = title.includes(searchTerm) || 
                     excerpt.includes(searchTerm) || 
                     tags.some(tag => tag.includes(searchTerm));

      item.style.display = isMatch ? '' : 'none';

      if (isMatch && searchTerm) {
        highlightText(item, searchTerm);
      } else {
        removeHighlight(item);
      }
    });
  });

  function highlightText(element, searchTerm) {
    const walker = document.createTreeWalker(
      element,
      NodeFilter.SHOW_TEXT,
      null,
      false
    );

    let node;
    while (node = walker.nextNode()) {
      const text = node.textContent.toLowerCase();
      if (text.includes(searchTerm)) {
        const span = document.createElement('span');
        span.className = 'highlight';
        const regex = new RegExp(searchTerm, 'gi');
        span.innerHTML = node.textContent.replace(regex, match => `<mark>${match}</mark>`);
        node.parentNode.replaceChild(span, node);
      }
    }
  }

  function removeHighlight(element) {
    const highlights = element.querySelectorAll('.highlight');
    highlights.forEach(highlight => {
      const parent = highlight.parentNode;
      parent.replaceChild(document.createTextNode(highlight.textContent), highlight);
    });
  }
});
</script>
